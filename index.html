<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bharani Krishnaa — BI & Analytics</title>
<meta name="description" content="Business Intelligence & Analytics portfolio of Gopalakrishnan Bharani Krishnaa — Python, SQL, Power BI, AI-powered analytics.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#ffffff;
    --surface:#fafafa;
    --surface-2:#f4f4f5;
    --ink:#0a0a0a;
    --ink-soft:#3f3f46;
    --muted:#71717a;
    --faint:#a1a1aa;
    --line:#e4e4e7;
    --line-strong:#d4d4d8;
    --accent:#0a0a0a;
    --accent-bright:#52525b;
    --accent-wash:#f9f9f9;
    --c1:#0a0a0a; --c2:#3f3f46; --c3:#71717a; --c4:#a1a1aa; --c5:#52525b;
    --ok:#16a34a;
    --shadow:0 1px 2px rgba(0,0,0,.04), 0 4px 16px rgba(0,0,0,.06);
    --shadow-lg:0 10px 34px rgba(0,0,0,.10);
    --r:16px;
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:'Inter',system-ui,sans-serif;
    background:var(--bg);
    color:var(--ink);
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none !important;transition:none !important;scroll-behavior:auto !important}
  }

  .wrap{max-width:1080px;margin:0 auto;padding:0 24px}

  /* ── Mono utility ── */
  .mono{font-family:'JetBrains Mono',monospace}
  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;
    color:var(--accent-bright);font-weight:500;
  }

  /* ── TOP BAR ── */
  .topbar{
    position:sticky;top:0;z-index:50;
    background:rgba(255,255,255,.82);
    backdrop-filter:blur(14px);
    border-bottom:1px solid var(--line);
  }
  .topbar-inner{
    max-width:1080px;margin:0 auto;padding:14px 24px;
    display:flex;align-items:center;justify-content:space-between;gap:16px;
  }
  .brand{display:flex;align-items:center;gap:11px;text-decoration:none}
  .brand-mark{
    width:34px;height:34px;border-radius:9px;flex-shrink:0;
    background:var(--accent);color:#fff;
    display:flex;align-items:center;justify-content:center;
    font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1rem;
    letter-spacing:-.02em;
  }
  .brand-text{display:flex;flex-direction:column;line-height:1.15}
  .brand-name{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:.95rem;color:var(--ink);letter-spacing:-.01em}
  .brand-role{font-size:.7rem;color:var(--muted)}
  .nav{display:flex;align-items:center;gap:4px}
  .nav a{
    font-size:.84rem;color:var(--ink-soft);text-decoration:none;font-weight:500;
    padding:7px 12px;border-radius:8px;transition:background .15s,color .15s;
  }
  .nav a:hover{background:var(--surface-2);color:var(--ink)}
  .nav-cta{
    background:var(--accent) !important;color:#fff !important;
    padding:8px 15px !important;
  }
  .nav-cta:hover{background:#27272a !important}
  .nav-links{display:flex;align-items:center;gap:4px}
  @media (max-width:720px){ .nav-links{display:none} }

  /* ── HERO / DASHBOARD HEADER ── */
  .hero{Padding:54px 0 18px}
  .hero-top{
    display:flex;align-items:center;justify-content:space-between;
    flex-wrap:wrap;gap:14px;margin-bottom:22px;
  }
  .refresh{
    display:inline-flex;align-items:center;gap:8px;
    font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--muted);
    background:var(--surface);border:1px solid var(--line);
    padding:6px 12px;border-radius:99px;
  }
  .dot-live{width:7px;height:7px;border-radius:50%;background:var(--ok);position:relative}
  .dot-live::after{
    content:'';position:absolute;inset:-4px;border-radius:50%;
    background:var(--ok);opacity:.3;animation:pulse 2s ease-out infinite;
  }
  @keyframes pulse{0%{transform:scale(.6);opacity:.5}100%{transform:scale(2.4);opacity:0}}

  .avail{
    display:inline-flex;align-items:center;gap:8px;
    font-size:.78rem;color:var(--ink-soft);font-weight:500;
    background:var(--accent-wash);border:1px solid var(--line-strong);
    padding:6px 13px;border-radius:99px;
  }
  .avail .dot-live{background:var(--accent-bright)}
  .avail .dot-live::after{background:var(--accent-bright)}

  .hero h1{
    font-family:'Space Grotesk',sans-serif;
    font-size:clamp(2.1rem,6vw,3.4rem);
    font-weight:700;line-height:1.04;letter-spacing:-.025em;
    color:var(--ink);margin-bottom:14px;
  }
  .hero h1 .accent{color:var(--accent)}
  .hero-sub{
    font-size:clamp(1rem,2.4vw,1.18rem);color:var(--ink-soft);
    max-width:600px;margin-bottom:6px;
  }
  .hero-meta{
    display:flex;flex-wrap:wrap;gap:18px;margin-top:18px;
    font-size:.86rem;color:var(--muted);
  }
  .hero-meta span{display:inline-flex;align-items:center;gap:7px}
  .hero-meta svg{width:15px;height:15px;stroke:var(--accent-bright);fill:none;stroke-width:1.8}

  /* ── AVATAR ── */
  .avatar{
    width:96px;height:96px;border-radius:50%;margin-bottom:22px;
    position:relative;overflow:hidden;flex-shrink:0;
    background:var(--ink);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 0 0 4px var(--bg), 0 0 0 5.5px var(--line-strong), var(--shadow);
  }
  .avatar img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .avatar-fallback{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:2.4rem;color:#fff;letter-spacing:-.02em}

  /* ── KPI STRIP ── */
  .kpis{
    display:grid;grid-template-columns:repeat(4,1fr);gap:14px;
    margin-top:34px;
  }
  @media (max-width:760px){ .kpis{grid-template-columns:repeat(2,1fr)} }
  .kpi{
    background:var(--bg);border:1px solid var(--line);border-radius:var(--r);
    padding:20px 20px 17px;box-shadow:var(--shadow);position:relative;overflow:hidden;
    transition:transform .25s,box-shadow .25s,border-color .25s;
  }
  .kpi:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:var(--line-strong)}
  .kpi-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .kpi-ico{
    width:30px;height:30px;border-radius:8px;
    background:var(--accent-wash);color:var(--accent);
    display:flex;align-items:center;justify-content:center;
  }
  .kpi-ico svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.9}
  .kpi-trend{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--ok);font-weight:500}
  .kpi-val{
    font-family:'Space Grotesk',sans-serif;font-weight:700;
    font-size:2rem;line-height:1;color:var(--ink);letter-spacing:-.02em;
  }
  .kpi-val .suf{color:var(--accent)}
  .kpi-label{font-size:.78rem;color:var(--muted);margin-top:6px;font-weight:500}

  /* ── SECTION SCAFFOLD ── */
  section{padding:46px 0}
  .sec-head{margin-bottom:26px}
  .sec-head h2{
    font-family:'Space Grotesk',sans-serif;font-weight:700;
    font-size:clamp(1.5rem,4vw,2rem);letter-spacing:-.02em;color:var(--ink);
    margin-top:8px;
  }
  .sec-head p{color:var(--muted);font-size:.95rem;margin-top:6px;max-width:580px}

  .panel{
    background:var(--bg);border:1px solid var(--line);border-radius:var(--r);
    box-shadow:var(--shadow);
  }

  /* ── ABOUT ── */
  .about-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:22px}
  @media (max-width:820px){ .about-grid{grid-template-columns:1fr} }
  .about-card{padding:28px 30px}
  .about-card p{color:var(--ink-soft);font-size:1rem;margin-bottom:14px}
  .about-card p:last-child{margin-bottom:0}
  .about-card strong{color:var(--ink);font-weight:600}
  .quick{padding:26px 26px;background:var(--surface);display:flex;flex-direction:column;gap:2px}
  .quick-row{
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:12px 0;border-bottom:1px dashed var(--line-strong);
  }
  .quick-row:last-child{border-bottom:none}
  .quick-k{font-size:.8rem;color:var(--muted);display:flex;align-items:center;gap:9px}
  .quick-k svg{width:15px;height:15px;stroke:var(--accent-bright);fill:none;stroke-width:1.8}
  .quick-v{font-size:.85rem;color:var(--ink);font-weight:600;text-align:right}
  .quick-v.mono{font-family:'JetBrains Mono',monospace;font-weight:500}

  /* ── SKILLS ── */
  .skills-grid{display:grid;grid-template-columns:.9fr 1.1fr;gap:22px;align-items:stretch}
  @media (max-width:880px){ .skills-grid{grid-template-columns:1fr} }
  .radar-card{padding:24px 24px 18px;display:flex;flex-direction:column}
  .radar-title{font-size:.82rem;color:var(--muted);font-weight:600;margin-bottom:4px;text-align:center}
  .radar-host{flex:1;min-height:300px;position:relative;display:flex;align-items:center;justify-content:center}

  .stacks{display:flex;flex-direction:column;gap:16px}
  .stack{padding:20px 22px}
  .stack-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .stack-ico{
    width:30px;height:30px;border-radius:8px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;color:#fff;
  }
  .stack-ico svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.9}
  .stack-name{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:.95rem;color:var(--ink)}
  .chips{display:flex;flex-wrap:wrap;gap:7px}
  .chip{
    font-family:'JetBrains Mono',monospace;font-size:.74rem;font-weight:500;
    background:var(--surface-2);color:var(--ink-soft);
    padding:5px 11px;border-radius:7px;border:1px solid var(--line);
    transition:transform .15s,border-color .15s,color .15s;
  }
  .chip:hover{transform:translateY(-2px);border-color:var(--accent-bright);color:var(--accent)}

  /* ── PROJECTS ── */
  .filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px}
  .filter{
    font-family:'JetBrains Mono',monospace;font-size:.78rem;font-weight:500;
    background:var(--bg);color:var(--ink-soft);
    border:1px solid var(--line-strong);padding:8px 15px;border-radius:99px;
    cursor:pointer;transition:all .18s;
  }
  .filter:hover{border-color:var(--accent-bright);color:var(--accent)}
  .filter.active{background:var(--accent);color:#fff;border-color:var(--accent)}

  .proj-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  @media (max-width:780px){ .proj-grid{grid-template-columns:1fr} }
  .proj{
    background:var(--bg);border:1px solid var(--line);border-radius:var(--r);
    padding:24px 24px;box-shadow:var(--shadow);position:relative;overflow:hidden;
    transition:transform .3s,box-shadow .3s,border-color .3s;
    display:flex;flex-direction:column;
  }
  .proj:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:var(--line-strong)}
  .proj.feature{grid-column:1/-1;border-color:var(--line-strong);background:linear-gradient(180deg,#fafafa,#ffffff)}
  .proj.hide{display:none}
  .proj-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:13px}
  .proj-badge{
    display:inline-flex;align-items:center;gap:7px;
    font-family:'JetBrains Mono',monospace;font-size:.68rem;font-weight:500;
    text-transform:uppercase;letter-spacing:.08em;
    padding:5px 10px;border-radius:7px;
  }
  .badge-ai{background:#0a0a0a;color:#fff}
  .badge-bi{background:var(--surface-2);color:var(--ink);border:1px solid var(--line)}
  .proj-star{
    font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--ink);
    font-weight:700;display:inline-flex;align-items:center;gap:5px;
  }
  .proj h3{
    font-family:'Space Grotesk',sans-serif;font-weight:600;
    font-size:1.18rem;color:var(--ink);letter-spacing:-.01em;margin-bottom:9px;
  }
  .proj.feature h3{font-size:1.4rem}
  .proj p{color:var(--ink-soft);font-size:.92rem;margin-bottom:16px;flex:1}
  .proj-metrics{display:flex;gap:20px;margin-bottom:16px;flex-wrap:wrap}
  .pm{display:flex;flex-direction:column}
  .pm-v{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.25rem;color:var(--accent);line-height:1}
  .pm-l{font-size:.72rem;color:var(--muted);margin-top:3px}
  .tech{display:flex;flex-wrap:wrap;gap:6px;padding-top:14px;border-top:1px solid var(--line)}
  .tech span{
    font-family:'JetBrains Mono',monospace;font-size:.71rem;color:var(--muted);
    background:var(--surface);padding:4px 9px;border-radius:6px;
  }

  /* ── TIMELINE ── */
  .tl-grid{display:grid;grid-template-columns:1fr 1fr;gap:22px}
  @media (max-width:820px){ .tl-grid{grid-template-columns:1fr} }
  .tl-col h3{
    font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:1.02rem;
    color:var(--ink);margin-bottom:18px;display:flex;align-items:center;gap:10px;
  }
  .tl-col h3 svg{width:18px;height:18px;stroke:var(--accent);fill:none;stroke-width:1.9}
  .tl{position:relative;padding-left:26px}
  .tl::before{content:'';position:absolute;left:6px;top:6px;bottom:6px;width:2px;background:var(--line-strong)}
  .tl-item{position:relative;padding-bottom:22px}
  .tl-item:last-child{padding-bottom:0}
  .tl-item::before{
    content:'';position:absolute;left:-26px;top:5px;width:11px;height:11px;border-radius:50%;
    background:var(--bg);border:2.5px solid var(--accent);box-shadow:0 0 0 3px var(--bg);
  }
  .tl-item.now::before{background:var(--accent)}
  .tl-date{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--accent-bright);font-weight:500;margin-bottom:3px}
  .tl-title{font-weight:600;font-size:.95rem;color:var(--ink)}
  .tl-org{font-size:.84rem;color:var(--muted);margin-top:1px}
  .tl-note{font-size:.83rem;color:var(--ink-soft);margin-top:6px}

  /* ── LANGUAGES (mini-dash) ── */
  .lang-card{padding:26px 28px;display:grid;grid-template-columns:1fr 1fr;gap:26px;align-items:center}
  @media (max-width:680px){ .lang-card{grid-template-columns:1fr;gap:20px} }
  .lang-list{display:flex;flex-direction:column;gap:16px}
  .lang-row{display:flex;flex-direction:column;gap:6px}
  .lang-top{display:flex;align-items:center;justify-content:space-between}
  .lang-name{font-weight:600;font-size:.9rem;color:var(--ink)}
  .lang-lvl{font-family:'JetBrains Mono',monospace;font-size:.74rem;color:var(--muted)}
  .bar{height:7px;background:var(--surface-2);border-radius:99px;overflow:hidden}
  .bar-fill{height:100%;border-radius:99px;width:0;transition:width 1.1s cubic-bezier(.16,1,.3,1)}
  .donut-host{position:relative;min-height:180px;display:flex;align-items:center;justify-content:center}

  /* ── CONTACT / FOOTER ── */
  .contact{padding:56px 0 0}
  .contact-card{
    background:var(--accent);border-radius:22px;padding:48px 40px;color:#fff;
    text-align:center;position:relative;overflow:hidden;
  }
  .contact-card::before{
    content:'';position:absolute;top:-60px;right:-30px;width:260px;height:260px;border-radius:50%;
    background:radial-gradient(circle,rgba(255,255,255,.08),transparent 65%);
  }
  .contact-card h2{
    font-family:'Space Grotesk',sans-serif;font-weight:700;
    font-size:clamp(1.6rem,4vw,2.3rem);letter-spacing:-.02em;margin-bottom:12px;position:relative;
  }
  .contact-card p{color:rgba(255,255,255,.82);font-size:1rem;max-width:480px;margin:0 auto 26px;position:relative}
  .cta-row{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;position:relative}
  .cta{
    display:inline-flex;align-items:center;gap:9px;text-decoration:none;
    font-weight:600;font-size:.9rem;padding:13px 22px;border-radius:11px;
    transition:transform .18s,background .18s;
  }
  .cta svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.9}
  .cta-primary{background:#fff;color:var(--accent)}
  .cta-primary:hover{transform:translateY(-2px);background:#f0f4f8}
  .cta-ghost{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.25)}
  .cta-ghost:hover{transform:translateY(-2px);background:rgba(255,255,255,.2)}

  footer{padding:34px 0 40px;text-align:center}
  footer p{font-size:.82rem;color:var(--faint)}
  footer .mono{color:var(--muted)}

  /* ── reveal ── */
  .reveal{opacity:0;transform:translateY(18px);transition:opacity .6s ease,transform .6s ease}
  .reveal.in{opacity:1;transform:none}
</style>
</head>
<body>

<!-- TOP BAR -->
<header class="topbar">
  <div class="topbar-inner">
    <a class="brand" href="#top">
      <div class="brand-mark">B</div>
      <div class="brand-text">
        <span class="brand-name">Bharani Krishnaa</span>
        <span class="brand-role">BI &amp; Analytics</span>
      </div>
    </a>
    <nav class="nav">
      <div class="nav-links">
        <a href="#about">About</a>
        <a href="#skills">Skills</a>
        <a href="#work">Projects</a>
        <a href="#path">Journey</a>
      </div>
      <a class="nav-cta" href="#contact">Get in touch</a>
    </nav>
  </div>
</header>

<main id="top">
<div class="wrap">

  <!-- HERO -->
  <section class="hero" id="about" style="padding-top:48px">
    <div class="hero-top">
      <div class="refresh"><span class="dot-live"></span> LIVE · data refreshed today</div>
      <div class="avail"><span class="dot-live"></span> Open to internships · July 2026</div>
    </div>

    <!-- PROFILE PHOTO: rename your photo to "profile.jpg" and place it next to this
         HTML file (or paste an image URL into src). Until then, the "B" initial shows. -->
    <div class="avatar" title="Bharani Krishnaa">
      <img src="profile.jpg" alt="Bharani Krishnaa">
